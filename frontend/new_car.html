<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить авто</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header>
    <div class="container">
        <h1>CarsApp</h1>
        <nav>
            <ul>
                <li><a href="/">Главная</a></li>
                <li><a href="/search">Поиск</a></li>
                <li><a href="/popular">Популярные</a></li>
                <li><a class="active" href="/cars/new">Добавить авто</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <div class="container">
        <div class="page-header">
            <h2>Добавить автомобиль</h2>
            <a class="btn btn-secondary" href="/">Назад</a>
        </div>

        <div class="panel">
            <form id="car-form" class="simple-form form-stacked">
                <div class="form-group">
                    <label for="name">Название</label>
                    <input type="text" id="name" placeholder="Название" required />
                </div>

                <div class="form-group">
                    <label for="brand">Бренд</label>
                    <input type="text" id="brand" placeholder="Бренд" required />
                </div>

                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" placeholder="Описание"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Цена</label>
                        <input type="number" id="price" placeholder="Цена" required />
                    </div>

                    <div class="form-group">
                        <label for="stock">Количество</label>
                        <input type="number" id="stock" placeholder="Количество" required />
                    </div>
                </div>

                <button class="btn btn-primary" type="submit">Создать</button>
            </form>
        </div>
    </div>
</main>

<script>
const API_URL = "http://localhost:8000/api";

document.getElementById("car-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        brand: document.getElementById("brand").value,
        description: document.getElementById("description").value,
        price: Number(document.getElementById("price").value),
        stock: Number(document.getElementById("stock").value)
    };

    await fetch(`${API_URL}/cars/new`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    window.location.href = "/";
});
</script>

</body>
</html>
